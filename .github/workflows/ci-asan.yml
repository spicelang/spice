# C++ CI with AddressSanitizer
name: C++ CI - ASAN

on:
  # Every Monday at 03:00 UTC
  schedule:
    - cron: '0 3 * * 1'
  # Allow manual triggering
  workflow_dispatch:

env:
  LLVM_VERSION: "llvmorg-22.1.7"
  GCC_VERSION: "16"

jobs:
  build-linux-x86-asan:
    name: C++ CI - Linux/x86_64 with ASAN
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 25
          java-package: jre

      - name: Setup Dependencies
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install ninja-build graphviz pipx uuid-dev libcurl4-openssl-dev gcc-${{ env.GCC_VERSION }} g++-${{ env.GCC_VERSION }}
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-${{ env.GCC_VERSION }} 1${{ env.GCC_VERSION }}
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-${{ env.GCC_VERSION }} 1${{ env.GCC_VERSION }}
          sudo update-alternatives --install /usr/bin/gcov gcov /usr/bin/gcov-${{ env.GCC_VERSION }} 1${{ env.GCC_VERSION }}

      - name: Setup Mold
        uses: rui314/setup-mold@v1

      - name: Setup CCache
        uses: hendrikmuhs/ccache-action@v1

      - name: Clone LLVM
        run: git clone --depth 1 --branch ${{ env.LLVM_VERSION }} https://github.com/llvm/llvm-project llvm

      - name: Cache LLVM
        id: cache-llvm
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/llvm/build
          key: llvm-${{ env.LLVM_VERSION }}-linux-x64-nortti

      - name: Build LLVM
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        working-directory: llvm
        run: |
          mkdir ./build
          cd ./build
          cmake -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DCMAKE_CXX_FLAGS_RELEASE="-O3" \
            -DLLVM_TARGETS_TO_BUILD="AArch64;X86;WebAssembly" \
            -DLLVM_BUILD_TOOLS=OFF \
            ../llvm
          cmake --build .

      - name: Download Libs
        run: ./setup-deps.sh

      - name: Build test target with ASAN
        env:
          LLVM_DIR: ${{ github.workspace }}/llvm/build/lib/cmake/llvm
        run: |
          mkdir ./build
          cd ./build
          cmake -GNinja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DSPICE_BUILT_BY="ghactions" \
            -DSPICE_ASAN=ON \
            -Wattributes \
            ..
          cmake --build . --target spicetest

      - name: Run Test target with ASAN
        working-directory: build/test
        env:
          LLVM_LIB_DIR: /${{ github.workspace }}/llvm/build/lib
          LLVM_INCLUDE_DIR: ${{ github.workspace }}/llvm/llvm/include
          LLVM_BUILD_INCLUDE_DIR: ${{ github.workspace }}/llvm/build/include
          SPICE_STD_DIR: ${{ github.workspace }}/std
          SPICE_BOOTSTRAP_DIR: ${{ github.workspace }}/src-bootstrap
          ASAN_OPTIONS: "detect_leaks=1:halt_on_error=1:abort_on_error=1:print_summary=1"
        run: ./spicetest --is-github-actions --skip-sanitizer-tests
