# ----------------------------------------------------------------------------
# Theme options
# ----------------------------------------------------------------------------
[project.theme]
# Use the traditional Material for MkDocs look-and-feel.
variant = "classic"
custom_dir = "docs/overrides"
language = "en"
favicon = "static/favicon-96x96.ico"
logo = "static/avatar.png"
features = [
  "navigation.instant",
  "navigation.tabs",
  "navigation.top",
  "content.code.copy",
  "content.action.edit",
  "content.action.view",
  "content.tabs.link",
  "announce.dismiss",
]

# System preference (auto)
[[project.theme.palette]]
media = "(prefers-color-scheme)"
primary = "red"
accent = "deep-orange"
toggle.icon = "material/brightness-auto"
toggle.name = "Switch to light mode"

# Light mode
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "red"
accent = "deep-orange"
toggle.icon = "material/brightness-7"
toggle.name = "Switch to dark mode"

# Dark mode
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "red"
accent = "deep-orange"
toggle.icon = "material/brightness-4"
toggle.name = "Switch to system preference"

# ----------------------------------------------------------------------------
# Extra settings
# ----------------------------------------------------------------------------
[project.extra.status]
new = "Recently added"
deprecated = "Deprecated"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/spicelang/spice"

[[project.extra.social]]
icon = "fontawesome/brands/x-twitter"
link = "https://x.com/chillibits"

[[project.extra.social]]
icon = "fontawesome/brands/docker"
link = "https://hub.docker.com/r/chillibits/spice"

# ----------------------------------------------------------------------------
# Markdown extensions
# ----------------------------------------------------------------------------
[project.markdown_extensions.meta]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.highlight]
auto_title = true
linenums = true
anchor_linenums = true
use_pygments = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
