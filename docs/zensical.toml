# ============================================================================
# Zensical configuration for the Spice Programming Language documentation.
# Converted from the Material for MkDocs "mkdocs.yml" compatibility config.
# ============================================================================

[project]

site_name = "Spice Programming Language"
site_url = "https://www.spicelang.com"
site_description = "The fast, powerful, self-contained and programmer oriented systems language Spice."
site_author = "Marc Auberer"
copyright = '''Made with ❤️ by Spice contributors, powered by <a href="https://www.chillibits.com" target="_blank">ChilliBits</a>.'''

repo_name = "spicelang/spice"
repo_url = "https://github.com/spicelang/spice"
edit_uri = "edit/main/docs/docs/"

# Additional stylesheets (relative to docs_dir).
extra_css = ["stylesheets/styles.css"]

# ----------------------------------------------------------------------------
# Navigation
# ----------------------------------------------------------------------------
nav = [
  { Home = "index.md" },
  "intro.md",
  { Install = [
    "install/linux.md",
    "install/macos.md",
    "install/windows.md",
    "install/docker.md",
    "install/source.md",
  ] },
  { "CLI Usage" = [
    "cli/build.md",
    "cli/run.md",
    "cli/test.md",
    "cli/install.md",
    "cli/uninstall.md",
  ] },
  { Tutorials = [
    "how-to/oop.md",
    "how-to/cli-parser.md",
    "how-to/web-assembly.md",
    "how-to/cpp-interop.md",
  ] },
  { Documentation = [
    "language/hello-world.md",
    "language/main-function.md",
    "language/builtins.md",
    "language/primitive-types.md",
    "language/builtin-types.md",
    "language/casts.md",
    "language/if-statements.md",
    "language/switch-statements.md",
    "language/while-loops.md",
    "language/do-while-loops.md",
    "language/for-loops.md",
    "language/foreach-loops.md",
    "language/procedures.md",
    "language/functions.md",
    "language/lambda-functions.md",
    "language/modules.md",
    "language/declaration-qualifiers.md",
    "language/attributes.md",
    "language/arrays.md",
    "language/pointers.md",
    "language/references.md",
    "language/enums.md",
    "language/structs.md",
    "language/methods.md",
    "language/constructors-destructors.md",
    "language/interfaces.md",
    "language/aliases.md",
    "language/generics.md",
    "language/threads.md",
    "language/number-formats.md",
    "language/operator-overloading.md",
    "language/operator-precedence.md",
  ] },
  # >>> BEGIN std library nav (generated by tools/generate_std_docs.py) >>>
  # <<< END std library nav <<<
  { Contributing = [
    "contributing.md",
    { "Coding Style Guide" = "https://github.com/spicelang/spice/blob/main/STYLE_GUIDE.md" },
  ] },
]

# ----------------------------------------------------------------------------
# Theme options
# ----------------------------------------------------------------------------
[project.theme]
# Use the traditional Material for MkDocs look-and-feel.
variant = "classic"
custom_dir = "docs/overrides"
language = "en"
favicon = "static/favicon-96x96.ico"
logo = "static/avatar.png"
features = [
  "navigation.instant",
  "navigation.tabs",
  "navigation.top",
  "content.code.copy",
  "content.action.edit",
  "content.action.view",
  "content.tabs.link",
  "announce.dismiss",
]

# System preference (auto)
[[project.theme.palette]]
media = "(prefers-color-scheme)"
primary = "red"
accent = "deep-orange"
toggle.icon = "material/brightness-auto"
toggle.name = "Switch to light mode"

# Light mode
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "red"
accent = "deep-orange"
toggle.icon = "material/brightness-7"
toggle.name = "Switch to dark mode"

# Dark mode
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "red"
accent = "deep-orange"
toggle.icon = "material/brightness-4"
toggle.name = "Switch to system preference"

# ----------------------------------------------------------------------------
# Extra settings
# ----------------------------------------------------------------------------
[project.extra.status]
new = "Recently added"
deprecated = "Deprecated"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/spicelang/spice"

[[project.extra.social]]
icon = "fontawesome/brands/x-twitter"
link = "https://x.com/chillibits"

[[project.extra.social]]
icon = "fontawesome/brands/docker"
link = "https://hub.docker.com/r/chillibits/spice"

# ----------------------------------------------------------------------------
# Markdown extensions
# ----------------------------------------------------------------------------
[project.markdown_extensions.meta]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.highlight]
auto_title = true
linenums = true
anchor_linenums = true
use_pygments = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
